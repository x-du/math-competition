<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      try {
        if (localStorage.getItem("theme") === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        }
      } catch (e) {}
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSV Viewer — Math Competition Records</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    .csv-viewer-page .csv-viewer-header {
      position: relative;
      padding: 1.5rem;
      padding-right: 4rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .csv-viewer-page .csv-viewer-header .theme-toggle {
      position: absolute;
      top: 1.25rem;
      right: 1rem;
    }
    .csv-viewer-header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .csv-viewer-back {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.95rem;
    }
    .csv-viewer-back:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }
    .csv-viewer-main {
      padding: 1.5rem;
      max-width: 100%;
      overflow-x: auto;
    }
    .csv-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .csv-table th,
    .csv-table td {
      padding: 0.5rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .csv-table th {
      background: var(--csv-thead-bg);
      font-weight: 600;
      position: sticky;
      top: 0;
      color: #f4f4f8;
      border-bottom: 2px solid var(--border);
    }
    .csv-table tr:hover td {
      background: var(--csv-row-hover);
    }
    .csv-table th.num,
    .csv-table td.num {
      text-align: right;
    }
    .csv-loading {
      padding: 3rem;
      text-align: center;
      color: var(--text-muted);
    }
    .csv-error {
      padding: 2rem;
      color: var(--error-text);
      background: var(--error-bg);
      border-radius: var(--radius);
      margin: 1rem;
    }
    .csv-error a {
      color: var(--accent);
    }
  </style>
</head>
<body class="csv-viewer-page">
  <header class="csv-viewer-header">
    <button
      type="button"
      id="theme-toggle"
      class="theme-toggle"
      aria-label="Switch theme"
      title="Theme"
    >
      <span class="theme-toggle-icon" aria-hidden="true"></span>
    </button>
    <a href="index.html" class="csv-viewer-back">← Back to search</a>
    <h1 id="viewer-title">Loading…</h1>
  </header>
  <main class="csv-viewer-main">
    <div id="csv-loading" class="csv-loading">Loading CSV…</div>
    <div id="csv-error" class="csv-error" hidden></div>
    <div id="csv-table-wrap" hidden>
      <table class="csv-table" id="csv-table" aria-label="Contest results"></table>
    </div>
  </main>

  <script>
    (function () {
      var THEME_KEY = "theme";
      var THEME_TOGGLE_SVG_SUN =
        '<svg class="theme-toggle-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"/></svg>';
      var THEME_TOGGLE_SVG_MOON =
        '<svg class="theme-toggle-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

      function getDocumentTheme() {
        return document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark";
      }

      function applyDocumentTheme(theme) {
        var root = document.documentElement;
        if (theme === "light") {
          root.setAttribute("data-theme", "light");
        } else {
          root.removeAttribute("data-theme");
        }
        try {
          localStorage.setItem(THEME_KEY, theme);
        } catch (e) {}
        var btn = document.getElementById("theme-toggle");
        if (btn) {
          if (theme === "light") {
            btn.setAttribute("aria-label", "Switch to dark mode");
            btn.setAttribute("title", "Dark mode");
          } else {
            btn.setAttribute("aria-label", "Switch to light mode");
            btn.setAttribute("title", "Light mode");
          }
          var ic = btn.querySelector(".theme-toggle-icon");
          if (ic) {
            ic.innerHTML = theme === "light" ? THEME_TOGGLE_SVG_MOON : THEME_TOGGLE_SVG_SUN;
          }
        }
      }

      var themeBtn = document.getElementById("theme-toggle");
      if (themeBtn) {
        applyDocumentTheme(getDocumentTheme());
        themeBtn.addEventListener("click", function () {
          applyDocumentTheme(getDocumentTheme() === "light" ? "dark" : "light");
        });
      }

      var REPO = "x-du/math-competition";
      var RAW_BASE_TEMPLATE = "https://raw.githubusercontent.com/" + REPO + "/{branch}/database/contests/";

      function getParams() {
        var params = new URLSearchParams(window.location.search);
        return {
          contest: params.get("contest") || "",
          year: params.get("year") || "",
          file: params.get("file") || "results.csv",
          name: params.get("name") || "",
          branch: params.get("branch") || ""
        };
      }

      function buildRawUrl(branch, contest, year, file) {
        var base = RAW_BASE_TEMPLATE.replace("{branch}", encodeURIComponent(branch));
        return base + encodeURIComponent(contest) + "/year%3D" + encodeURIComponent(year) + "/" + encodeURIComponent(file);
      }

      function escapeHtml(s) {
        if (s == null) return "";
        var div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      /** Strip BOM / trim / compare — hide internal IDs from the table (still in raw CSV). */
      function isInternalCsvColumn(fieldName) {
        var n = (fieldName || "").replace(/^\ufeff/, "").trim().toLowerCase();
        return n === "student_id" || n === "team_id";
      }

      function isNumericVal(val) {
        if (val == null || String(val).trim() === "") return true;
        return /^\d+(\.\d+)?$/.test(String(val).trim());
      }

      function isLocalhostHost() {
        var host = String(window.location.hostname || "").toLowerCase();
        return host === "localhost" || host === "127.0.0.1" || host === "::1";
      }

      function expandedStudentRecords(student) {
        var records = student.rec || student.records || [];
        return records;
      }

      function expandedStudentName(student) {
        return student.nm || student.name || ("Student #" + student.id);
      }

      function expandRecord(record, slugIndex, keyMap) {
        var out = {};
        for (var k in record) {
          if (!Object.prototype.hasOwnProperty.call(record, k)) continue;
          if (k === "c") {
            out.contest_slug = slugIndex[record[k]] || "";
            continue;
          }
          var longKey = keyMap[k] || k;
          out[longKey] = record[k];
        }
        return out;
      }

      /** Build a display table from local data.json when local CSVs are not on GitHub yet. */
      function localContestRows(params) {
        if (params.file && params.file !== "results.csv") return Promise.resolve([]);
        return fetch(new URL("data.json", window.location.href).href)
          .then(function (res) {
            if (!res.ok) return [];
            return res.json();
          })
          .then(function (json) {
            var rows = [];
            var slugIndex = json.slug_index || [];
            var keyMap = json.key_map || {};
            var students = json.students || [];
            var yearStr = String(params.year || "").trim();
            for (var si = 0; si < students.length; si++) {
              var student = students[si];
              var recs = expandedStudentRecords(student);
              for (var ri = 0; ri < recs.length; ri++) {
                var rec = expandRecord(recs[ri], slugIndex, keyMap);
                if ((rec.contest_slug || rec.contest || "") !== params.contest) continue;
                if (String(rec.year || "").trim() !== yearStr) continue;
                var row = { student_name: expandedStudentName(student), year: yearStr };
                var keys = Object.keys(rec).sort();
                for (var ki = 0; ki < keys.length; ki++) {
                  var key = keys[ki];
                  if (key === "contest_slug" || key === "contest" || key === "year") continue;
                  if (key === "mcp_points" || key === "mcp_rank" || key === "mcp_contrib") continue;
                  row[key] = rec[key];
                }
                rows.push(row);
              }
            }
            rows.sort(function (a, b) {
              var ar = parseFloat(a.rank || "999999");
              var br = parseFloat(b.rank || "999999");
              if (isNaN(ar)) ar = 999999;
              if (isNaN(br)) br = 999999;
              return ar - br;
            });
            return rows;
          })
          .catch(function () { return []; });
      }

      function renderLocalRowsIfPresent(params) {
        return localContestRows(params).then(function (rows) {
          if (!rows.length) return false;
          document.getElementById("csv-loading").hidden = true;
          var fields = Object.keys(rows[0]).filter(function (f) { return !isInternalCsvColumn(f); });
          renderTable(rows, fields);
          return true;
        });
      }

      function renderTable(data, fields) {
        var wrap = document.getElementById("csv-table-wrap");
        var table = document.getElementById("csv-table");
        wrap.hidden = false;

        var colAlign = [];
        for (var i = 0; i < fields.length; i++) {
          var allNumeric = true;
          for (var r = 0; r < data.length; r++) {
            var val = data[r][fields[i]];
            if (!isNumericVal(val)) {
              allNumeric = false;
              break;
            }
          }
          colAlign[i] = allNumeric ? "num" : "";
        }

        var thead = "<thead><tr>";
        for (var i = 0; i < fields.length; i++) {
          thead += "<th scope=\"col\"" + (colAlign[i] ? " class=\"" + colAlign[i] + "\"" : "") + ">" + escapeHtml(fields[i]) + "</th>";
        }
        thead += "</tr></thead>";

        var tbody = "<tbody>";
        for (var r = 0; r < data.length; r++) {
          tbody += "<tr>";
          for (var i = 0; i < fields.length; i++) {
            var val = data[r][fields[i]] != null ? String(data[r][fields[i]]) : "";
            tbody += "<td" + (colAlign[i] ? " class=\"" + colAlign[i] + "\"" : "") + ">" + escapeHtml(val) + "</td>";
          }
          tbody += "</tr>";
        }
        tbody += "</tbody>";

        table.innerHTML = thead + tbody;
      }

      function showError(msg, rawUrl) {
        document.getElementById("csv-loading").hidden = true;
        var errEl = document.getElementById("csv-error");
        errEl.hidden = false;
        errEl.innerHTML = msg + (rawUrl ? ' <a href="' + escapeHtml(rawUrl) + '" target="_blank" rel="noopener noreferrer">View raw file on GitHub</a>' : "");
      }

      function run() {
        var p = getParams();
        if (!p.contest || !p.year) {
          showError("Missing contest or year. Use ?contest=brumo-a&year=2026");
          document.getElementById("viewer-title").textContent = "CSV Viewer";
          return;
        }

        var titleName = (p.name && p.name.trim()) ? p.name.trim() : p.contest;
        var fullTitle = titleName + " " + p.year;
        document.getElementById("viewer-title").textContent = fullTitle;
        document.title = fullTitle + " — Math Competition Records";

        var branchFromUrl = (p.branch && p.branch.trim()) ? p.branch.trim() : null;
        var branchJsonUrl = new URL("branch.json", window.location.href).href;

        function getBranch(cfg) {
          if (branchFromUrl) return branchFromUrl;
          return (cfg && cfg.branch) ? cfg.branch : "main";
        }

        fetch(branchJsonUrl)
          .then(function (res) {
            if (res.ok) return res.json();
            return { branch: "main" };
          })
          .catch(function () { return { branch: "main" }; })
          .then(function (cfg) {
            if (isLocalhostHost()) {
              return renderLocalRowsIfPresent(p).then(function (rendered) {
                return rendered ? { localRendered: true } : cfg;
              });
            }
            return cfg;
          })
          .then(function (cfg) {
            if (cfg && cfg.localRendered) return cfg;
            var branch = getBranch(cfg);
            var rawUrl = buildRawUrl(branch, p.contest, p.year, p.file);
            return fetch(rawUrl).then(function (res) {
              return { res: res, rawUrl: rawUrl };
            });
          })
          .then(function (_a) {
            if (_a && _a.localRendered) return _a;
            var res = _a.res;
            var rawUrl = _a.rawUrl;
            if (!res.ok) throw new Error("Failed to load: " + res.status);
            return res.text().then(function (text) {
              return { text: text, rawUrl: rawUrl };
            });
          })
          .then(function (_a) {
            if (_a && _a.localRendered) return;
            var text = _a.text;
            var rawUrl = _a.rawUrl;
            document.getElementById("csv-loading").hidden = true;
            var result = Papa.parse(text, { header: true, skipEmptyLines: true });
            if (result.errors && result.errors.length) {
              showError("Parse error: " + (result.errors[0].message || "Unknown"), rawUrl);
              return;
            }
            var data = result.data;
            var fields = result.meta.fields || [];
            if (!fields.length && data.length) {
              fields = Object.keys(data[0]);
            }
            if (!data.length && !fields.length) {
              showError("Empty or invalid CSV.", rawUrl);
              return;
            }
            fields = fields.filter(function (f) { return !isInternalCsvColumn(f); });
            renderTable(data, fields);
          })
          .catch(function (err) {
            var rawUrl = buildRawUrl("main", p.contest, p.year, p.file);
            renderLocalRowsIfPresent(p).then(function (rendered) {
              if (!rendered) showError("Could not load CSV: " + (err.message || err), rawUrl);
            });
          });
      }

      run();
    })();
  </script>
</body>
</html>
